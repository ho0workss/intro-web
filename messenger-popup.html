<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>INTRO 메신저 - 팝업</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: ['class', '[data-theme="dark"]'] };</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *{font-family:'Noto Sans KR',-apple-system,sans-serif;box-sizing:border-box}
  body{background:#fff;color:#37352f;font-size:14px;margin:0;height:100vh;overflow:hidden}
  [data-theme="dark"] body{background:#191919;color:#e6e6e6}
  [data-theme="dark"] .bg-white{background:#252525 !important}
  [data-theme="dark"] .bg-gray-50{background:#1f1f1f !important}
  [data-theme="dark"] .bg-gray-100{background:#2a2a2a !important}
  [data-theme="dark"] .bg-black{background:#000 !important}
  [data-theme="dark"] .text-gray-700{color:#cfcfcf !important}
  [data-theme="dark"] .text-gray-500{color:#999 !important}
  [data-theme="dark"] .text-gray-400{color:#888 !important}
  [data-theme="dark"] .border-gray-100,[data-theme="dark"] .border-gray-200,[data-theme="dark"] .border-gray-300{border-color:#363636 !important}
  [data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select{background:#2a2a2a;color:#e6e6e6;border-color:#363636}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
  [data-theme="dark"] ::-webkit-scrollbar-thumb{background:#444}
  .hover-bg:hover{background:rgba(0,0,0,0.04)}
  [data-theme="dark"] .hover-bg:hover{background:rgba(255,255,255,0.04)}
  .drop-overlay{position:absolute;inset:0;background:rgba(35,131,226,0.1);border:2px dashed #2383e2;border-radius:8px;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:50}
  .context-menu{position:fixed;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.15);padding:4px;z-index:100;min-width:180px}
  [data-theme="dark"] .context-menu{background:#2a2a2a;border-color:#444}
  .context-menu-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:4px;font-size:13px;cursor:pointer}
  .context-menu-item:hover{background:#f7f6f3}
  [data-theme="dark"] .context-menu-item:hover{background:#333}
  .mention-dd{position:absolute;background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.15);padding:4px;z-index:90;max-height:200px;overflow-y:auto;width:200px}
  [data-theme="dark"] .mention-dd{background:#2a2a2a;border-color:#444}
  .mention-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:13px}
  .mention-item:hover{background:#f0f7ff}
  [data-theme="dark"] .mention-item:hover{background:#1a2733}
  @keyframes flash{0%,100%{background:transparent}50%{background:rgba(35,131,226,0.2)}}
  .flash-new{animation:flash 1.2s ease}
</style>
</head>
<body class="flex flex-col h-screen">

<div class="h-12 bg-black text-white flex items-center px-4 shrink-0">
  <span class="font-black text-lg tracking-widest">INTRO</span>
  <span class="text-xs text-gray-400 ml-2">메신저 (팝업)</span>
  <div class="ml-auto flex items-center gap-2">
    <span id="syncDot" class="w-2 h-2 bg-green-400 rounded-full animate-pulse" title="동기화 활성"></span>
    <span class="text-xs text-gray-400" id="userLabel">-</span>
    <button onclick="toggleTheme()" class="text-sm"><span id="themeIcon">🌙</span></button>
  </div>
</div>

<div class="h-10 px-3 border-b border-gray-200 bg-gray-50 flex items-center gap-2 shrink-0">
  <span class="text-xs text-gray-500 shrink-0">채팅방:</span>
  <select id="roomSelect" onchange="loadMessages()" class="flex-1 px-2 py-1 border border-gray-200 rounded text-xs bg-white">
    <option>전체 공지방</option>
    <option>마케팅팀</option>
    <option>디자인팀</option>
    <option>개발팀</option>
  </select>
</div>

<div class="px-3 py-1.5 bg-amber-50 border-b border-amber-200 text-xs flex items-center gap-2 shrink-0">
  <span>📌</span><span class="flex-1 truncate text-amber-900">신규 매뉴얼 5/20까지 확인</span>
</div>

<div id="chatArea" class="flex-1 overflow-hidden relative flex flex-col"
  ondragenter="onDragEnter(event)" ondragover="event.preventDefault()"
  ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
  <div id="dropOverlay" class="hidden drop-overlay">
    <div class="bg-white px-6 py-4 rounded-xl shadow-lg text-center">
      <p class="text-3xl mb-1">📎</p><p class="text-sm font-bold">파일을 놓으세요</p>
    </div>
  </div>
  <div id="messageList" class="flex-1 overflow-y-auto p-3 space-y-2 bg-gray-50"></div>
</div>

<div id="emoticonSuggest" class="hidden px-3 py-2 border-t border-gray-200 bg-amber-50 shrink-0">
  <div class="flex flex-wrap gap-1" id="emoticonList"></div>
</div>

<div class="border-t border-gray-200 bg-white p-2 shrink-0 relative">
  <div id="mentionDropdown" class="mention-dd hidden"></div>
  <div class="flex items-end gap-1.5 border border-gray-300 rounded-xl px-2 py-1.5 focus-within:border-black bg-white">
    <button onclick="document.getElementById('fileInput').click()" class="p-1 hover-bg rounded text-sm">📎</button>
    <button onclick="toggleEmoticon()" class="p-1 hover-bg rounded text-sm">😊</button>
    <button onclick="insertChar('@')" class="p-1 hover-bg rounded text-sm">@</button>
    <textarea id="msgInput" oninput="onMsgInput(this)" onkeydown="onMsgKeyDown(event)"
      onpaste="onPaste(event)" rows="1" placeholder="메시지... (Enter 전송, @ 멘션, 파일 드래그/붙여넣기)"
      class="flex-1 px-1.5 py-1 text-sm resize-none focus:outline-none bg-transparent"
      style="min-height:24px;max-height:120px"></textarea>
    <button onclick="sendMsg()" class="px-2.5 py-1.5 bg-black text-white rounded-lg text-sm">➤</button>
  </div>
  <p class="text-[10px] text-gray-400 mt-1 px-1">💡 메인 창과 실시간 동기화 · 메인 창 닫아도 유지됨</p>
  <input type="file" id="fileInput" multiple class="hidden" onchange="handleFiles(this.files)" />
</div>

<div id="messageContextMenu" class="context-menu hidden"></div>

<script>
const ST={get(k,d){try{return JSON.parse(localStorage.getItem('intro_'+k))||d}catch{return d}},set(k,v){localStorage.setItem('intro_'+k,JSON.stringify(v))}};
const USERS={
  intro:{name:'관리자',dept:'경영'},kim:{name:'김디자인',dept:'디자인'},
  lee:{name:'이마케팅',dept:'마케팅'},park:{name:'박개발',dept:'개발'}
};
const CURRENT=ST.get('currentUser',{username:'intro',name:'관리자'});
const CHANNEL=new BroadcastChannel('intro-messenger');

document.getElementById('userLabel').textContent=CURRENT.name;

function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  document.getElementById('themeIcon').textContent=next==='dark'?'☀️':'🌙';
  ST.set('theme',next);
}
if(ST.get('theme','light')==='dark'){toggleTheme()}

let currentRoom='전체 공지방';
function loadMessages(){
  currentRoom=document.getElementById('roomSelect').value;
  renderMessages(getMessages(currentRoom));
}
function getMessages(room){return ST.get('msgs_'+room,[])}
function saveMessages(room,m){ST.set('msgs_'+room,m)}

function renderMessages(msgs){
  const list=document.getElementById('messageList');
  list.innerHTML=msgs.map(m=>renderMessage(m)).join('');
  list.scrollTop=list.scrollHeight;
}
function renderMessage(m){
  const mine=m.from===CURRENT.username;
  let content='';
  if(m.type==='image'||m.type==='gif'){
    content=`<img src="${m.dataUrl}" class="max-w-[200px] rounded-xl" />`;
  }else if(m.type==='video'){
    content=`<video src="${m.dataUrl}" controls class="max-w-[200px] rounded-xl"></video>`;
  }else if(m.type==='file'){
    content=`<a href="${m.dataUrl}" download="${m.fileName}" class="flex items-center gap-2 px-3 py-2 ${mine?'bg-black text-white':'bg-white border border-gray-200'} rounded-2xl text-xs"><span>📄</span><div><p class="font-medium">${m.fileName||'파일'}</p><p class="text-[10px] opacity-60">${m.fileSize||''}</p></div></a>`;
  }else if(m.recalled){
    content=`<div class="bg-gray-200 text-gray-500 italic rounded-2xl px-3 py-2 text-xs">🗑️ 회수됨</div>`;
  }else{
    let txt=escapeHtml(m.content||'').replace(/@(\S+)/g,'<span class="text-amber-300 font-semibold">@$1</span>');
    content=`<div class="${mine?'bg-black text-white':'bg-white border border-gray-200'} rounded-2xl px-3 py-1.5 text-xs inline-block">${txt}${m.edited?'<span class="text-[9px] opacity-60 ml-1">(수정)</span>':''}</div>`;
  }
  const avatar=mine?'':`<div class="w-7 h-7 bg-gray-800 text-white rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">${(m.name||'?')[0]}</div>`;
  const nameTag=mine?'':`<p class="text-[10px] text-gray-500 mb-0.5 ml-1">${m.name}</p>`;
  return `<div class="flex gap-1.5 ${mine?'flex-row-reverse':''}" data-msgid="${m.id}" oncontextmenu="event.preventDefault();showCtx(event,${m.id},${mine})">${avatar}<div class="max-w-[80%] ${mine?'flex flex-col items-end':''}">${nameTag}<div class="flex items-end gap-1 ${mine?'flex-row-reverse':''}">${content}<span class="text-[9px] text-gray-400">${m.time}</span></div></div></div>`;
}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function sendMsg(){
  const ta=document.getElementById('msgInput');
  const text=ta.value.trim();
  if(!text)return;
  const mentions=[];
  text.replace(/@(\S+)/g,(m,name)=>{for(const [k,v] of Object.entries(USERS))if(v.name===name)mentions.push(k);return m});
  const msg={id:Date.now(),from:CURRENT.username,name:CURRENT.name,content:text,time:new Date().toTimeString().substring(0,5),type:'text',mentions};
  const msgs=getMessages(currentRoom);msgs.push(msg);saveMessages(currentRoom,msgs);renderMessages(msgs);
  CHANNEL.postMessage({type:'msg',room:currentRoom,message:msg,from:'popup'});
  ta.value='';ta.style.height='auto';
  document.getElementById('emoticonSuggest').classList.add('hidden');
  document.getElementById('mentionDropdown').classList.add('hidden');
}

CHANNEL.addEventListener('message',(e)=>{
  if(e.data.type==='msg'&&e.data.room===currentRoom&&e.data.from!=='popup'){
    const msgs=getMessages(currentRoom);
    if(!msgs.find(m=>m.id===e.data.message.id)){
      msgs.push(e.data.message);saveMessages(currentRoom,msgs);renderMessages(msgs);
      setTimeout(()=>{const last=document.querySelector(`[data-msgid="${e.data.message.id}"]`);if(last)last.classList.add('flash-new')},50);
    }
  }
  if(e.data.type==='reload'&&e.data.room===currentRoom)loadMessages();
});

function onDragEnter(e){e.preventDefault();document.getElementById('dropOverlay').classList.remove('hidden')}
function onDragLeave(e){if(e.relatedTarget&&document.getElementById('chatArea').contains(e.relatedTarget))return;document.getElementById('dropOverlay').classList.add('hidden')}
function onDrop(e){e.preventDefault();document.getElementById('dropOverlay').classList.add('hidden');handleFiles(e.dataTransfer.files)}
function onPaste(e){const items=Array.from(e.clipboardData.items);const files=items.filter(it=>it.kind==='file').map(it=>it.getAsFile()).filter(Boolean);if(files.length>0){e.preventDefault();handleFiles(files)}}
function handleFiles(files){
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      let type='file';
      if(file.type.startsWith('image/'))type=file.type==='image/gif'?'gif':'image';
      else if(file.type.startsWith('video/'))type='video';
      const msg={id:Date.now()+Math.random(),from:CURRENT.username,name:CURRENT.name,time:new Date().toTimeString().substring(0,5),type,fileName:file.name,fileSize:(file.size/1024).toFixed(1)+' KB',dataUrl:e.target.result};
      const msgs=getMessages(currentRoom);msgs.push(msg);saveMessages(currentRoom,msgs);renderMessages(msgs);
      CHANNEL.postMessage({type:'msg',room:currentRoom,message:msg,from:'popup'});
    };
    reader.readAsDataURL(file);
  });
}

function onMsgInput(ta){
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';
  const val=ta.value,pos=ta.selectionStart;
  const match=val.substring(0,pos).match(/@(\S*)$/);
  if(match){
    const filtered=Object.entries(USERS).filter(([k,u])=>u.name.includes(match[1])||k.includes(match[1].toLowerCase()));
    const dd=document.getElementById('mentionDropdown');
    if(filtered.length){
      dd.innerHTML=filtered.map(([k,u])=>`<div class="mention-item" onclick="insertMention('${u.name}')"><div class="w-5 h-5 bg-gray-700 text-white rounded-full flex items-center justify-center text-[10px] font-bold">${u.name[0]}</div><span>${u.name}</span><span class="text-[10px] text-gray-500 ml-auto">${u.dept}</span></div>`).join('');
      dd.style.left='8px';dd.style.bottom='100%';dd.style.marginBottom='4px';
      dd.classList.remove('hidden');
    }
  }else document.getElementById('mentionDropdown').classList.add('hidden');
  suggestEmoticon(val);
}
function insertMention(name){
  const ta=document.getElementById('msgInput');
  const val=ta.value,pos=ta.selectionStart;
  const before=val.substring(0,pos).replace(/@\S*$/,'@'+name+' ');
  ta.value=before+val.substring(pos);ta.focus();ta.setSelectionRange(before.length,before.length);
  document.getElementById('mentionDropdown').classList.add('hidden');
}
function onMsgKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
function insertChar(c){const ta=document.getElementById('msgInput');ta.value+=c;ta.focus();onMsgInput(ta)}

const EMOTICONS=['🥰','😄','😆','🤩','✨','🎉','💪','🔥','🚀','📈','✅','⏰','👍','👏','🙌','❤️','(◍•ᴗ•◍)','( ´ ▽ ` )','＼(^o^)／','╰(*°▽°*)╯'];
function suggestEmoticon(text){
  if(text.length<2){document.getElementById('emoticonSuggest').classList.add('hidden');return}
  document.getElementById('emoticonList').innerHTML=EMOTICONS.slice(0,12).map(e=>`<span class="cursor-pointer hover:bg-white rounded px-1.5 py-0.5 text-sm border border-gray-200 bg-white" onclick="insertEmoticon('${e}')">${e}</span>`).join('');
  document.getElementById('emoticonSuggest').classList.remove('hidden');
}
function insertEmoticon(e){const ta=document.getElementById('msgInput');ta.value+=' '+e;ta.focus();document.getElementById('emoticonSuggest').classList.add('hidden')}
function toggleEmoticon(){
  const s=document.getElementById('emoticonSuggest');
  if(s.classList.contains('hidden')){document.getElementById('emoticonList').innerHTML=EMOTICONS.map(e=>`<span class="cursor-pointer rounded px-1.5 py-0.5 text-sm border border-gray-200 bg-white" onclick="insertEmoticon('${e}')">${e}</span>`).join('');s.classList.remove('hidden')}
  else s.classList.add('hidden');
}

function showCtx(e,msgId,mine){
  const m=document.getElementById('messageContextMenu');
  const items=[
    {icon:'📋',label:'복사',fn:()=>{const msg=getMessages(currentRoom).find(x=>x.id===msgId);if(msg)navigator.clipboard.writeText(msg.content||'')}},
    {icon:'↩️',label:'답장',fn:()=>{}},
    {icon:'➡️',label:'전달',fn:()=>{}},
    {icon:'📌',label:'공지로 설정',fn:()=>{}},
    {icon:'📝',label:'메모로 저장',fn:()=>{}},
    {icon:'🔁',label:'반복 메시지로',fn:()=>{}}
  ];
  if(mine){
    items.push({icon:'✏️',label:'수정',fn:()=>{const msgs=getMessages(currentRoom);const msg=msgs.find(x=>x.id===msgId);const nc=prompt('수정:',msg.content);if(nc!==null){msg.content=nc;msg.edited=true;saveMessages(currentRoom,msgs);renderMessages(msgs);CHANNEL.postMessage({type:'reload',room:currentRoom,from:'popup'})}}});
    items.push({icon:'🗑️',label:'회수',danger:true,fn:()=>{if(confirm('회수?')){const msgs=getMessages(currentRoom);const msg=msgs.find(x=>x.id===msgId);msg.recalled=true;saveMessages(currentRoom,msgs);renderMessages(msgs);CHANNEL.postMessage({type:'reload',room:currentRoom,from:'popup'})}}});
  }
  m.innerHTML=items.map((it,i)=>`<div class="context-menu-item ${it.danger?'text-red-500':''}" onclick="window.__ctx[${i}]()"><span>${it.icon}</span>${it.label}</div>`).join('');
  window.__ctx=items.map(it=>()=>{it.fn();document.getElementById('messageContextMenu').classList.add('hidden')});
  m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';
  m.style.top=Math.min(e.clientY,window.innerHeight-300)+'px';
  m.classList.remove('hidden');
}
document.addEventListener('click',()=>document.getElementById('messageContextMenu')?.classList.add('hidden'));

loadMessages();
</script>
</body>
</html>
